<!DOCTYPE html>
<html>
<head>
  <title>Teacher Audio App</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #e3f2fd, #f4f7fb);
      margin: 0;
      padding: 0;
      text-align: center;
    }

    /* HEADER */
    .header {
      background: linear-gradient(135deg, #2c3e50, #4ca1af);
      color: white;
      padding: 25px 15px;
      border-bottom-left-radius: 20px;
      border-bottom-right-radius: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .header h1 {
      margin: 5px 0;
      font-size: 22px;
      letter-spacing: 1px;
    }

    .header p {
      margin: 3px 0;
      font-size: 14px;
      opacity: 0.9;
    }

    .highlight {
      font-size: 16px;
      font-weight: bold;
      color: #ffe082;
    }

    .best {
      margin-top: 5px;
      font-size: 14px;
      font-style: italic;
    }

    /* MAIN TITLE */
    .main-title {
      margin: 20px 0;
      font-size: 20px;
      color: #2c3e50;
    }

    /* TEACHER CARD */
    .teacher {
      background: white;
      margin: 15px auto;
      padding: 20px;
      width: 90%;
      max-width: 350px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .teacher:hover {
      transform: translateY(-5px);
    }

    button {
      padding: 10px 20px;
      border: none;
      background: #4CAF50;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
      font-size: 14px;
    }

    button:hover {
      background: #45a049;
    }

    .text {
      margin-top: 12px;
      font-size: 15px;
      color: #444;
      min-height: 40px;
      white-space: pre-line;
      border-top: 1px solid #eee;
      padding-top: 10px;
    }

  </style>
</head>

<body>

<!-- 🔥 HEADER -->
<div class="header">
  <h1>🏫 SAE SCHOOL</h1>
  <p>Karehalli, Bhadravthi</p>
  <p>SSLC 2025-26</p>
  <p class="highlight">*Study Warriors*</p>
  <p class="best">Best Wishes ✨</p>
</div>

<h2 class="main-title">🎧 Teacher Audio Library</h2>

<!-- Teacher 1 -->
<div class="teacher">
  <h3>Anjali Ma'am</h3>
  <button onclick="playTeacher('audio1','text1', 'ಬಣ್ಣ ಬಣ್ಣದ ಪುಟಾಣಿಗಳ ಲೋಕ, ವರ್ಣರಂಜಿತ ನರ್ಸರಿ ಕೊಠಡಿಗಳು... ಇಲ್ಲಿ ಪ್ರತಿ ಗೋಡೆಯು')">
    ▶ Play
  </button>

  <audio id="audio1">
    <source src="https://pedduhudga.github.io/Saes/anjali.mp3" type="audio/mpeg">
  </audio>

  <div id="text1" class="text"></div>
</div>

<script>
function stopAll() {
  document.querySelectorAll("audio").forEach(a => {
    a.pause();
    a.currentTime = 0;
  });
}

function typeText(element, text) {
  element.innerHTML = "";
  let i = 0;

  function typing() {
    if (i < text.length) {
      element.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, 30);
    }
  }

  typing();
}

function playTeacher(audioId, textId, text) {
  stopAll();
  let audio = document.getElementById(audioId);
  let textBox = document.getElementById(textId);
  audio.play();
  typeText(textBox, text);
}
</script>

</body>
</html>
