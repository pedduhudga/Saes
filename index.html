<!DOCTYPE html>
<html>
<head>
  <title>Teacher Audio Library</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f4f7fb;
    }

    h1 {
      color: #2c3e50;
    }

    .teacher {
      background: white;
      margin: 15px auto;
      padding: 15px;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    audio {
      width: 100%;
      margin-top: 10px;
    }

    .transcript {
      margin-top: 10px;
      font-size: 14px;
      color: #555;
    }
  </style>

</head>

<body>

<h1>Teacher Audio List</h1>

<div class="teacher">
  <h3>Ravi Sir</h3>
  <audio controls>
    <source src="https://pedduhudga.github.io/Saes/ravi.mp3" type="audio/mpeg">
  </audio>
  <div class="transcript">
    Today we will learn about plant nutrition...
  </div>
</div>

<div class="teacher">
  <h3>Anjali Ma'am</h3>
  <audio controls>
    <source src="https://pedduhudga.github.io/Saes/anjali.mp3" type="audio/mpeg">
  </audio>
  <div class="transcript">
    ಬಣ್ಣ ಬಣ್ಣದ ಪುಟಾಣಿಗಳ ಲೋಕ, ವರ್ಣರಂಜಿತ ನರ್ಸರಿ ಕೊಠಡಿಗಳು... ಇಲ್ಲಿ ಪ್ರತಿ ಗೋಡೆಯು
  </div>
</div>

</body>
</html>
