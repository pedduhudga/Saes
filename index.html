<!DOCTYPE html>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #e3f2fd, #f4f7fb);
      margin: 0;
      text-align: center;
    }

    .header {
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      padding: 30px 15px;
      border-bottom-left-radius: 25px;
      border-bottom-right-radius: 25px;
    }

    .school-name {

      font-weight: bold;

    .warriors {

      color: #ffeb3b;
      margin-top: 8px;
    }

      font-weight: bold;
      color: #2c3e50;
    }

    .teacher {
      background: white;
      margin: 15px auto;
      padding: 20px;
      width: 90%;
      max-width: 350px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    button {
      padding: 10px 20px;
      border: none;
      background: #4CAF50;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
      font-size: 14px;
    }

    .text {
      margin-top: 12px;
      font-size: 15px;
      color: #444;
      min-height: 50px;
      border-top: 1px solid #eee;
      padding-top: 10px;
      white-space: pre-line;
    }
  </style>
</head>

  </audio>
  <div id="text6" class="text"></div>
</div>

<script>
function stopAll() {
  document.querySelectorAll("audio").forEach(a => {
    a.pause();
    a.currentTime = 0;
  });

  document.querySelectorAll("button").forEach(b => {
    b.innerText = "▶ Play";
  });
}

function typeText(element, text) {
  element.innerHTML = "";
  let i = 0;

  function typing() {
    if (i < text.length) {
      element.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, 20);
    }
  }

  typing();
}

function toggleAudio(audioId, textId, text) {
  let audio = document.getElementById(audioId);
  let button = event.target;
  let textBox = document.getElementById(textId);

  if (audio.paused) {
    stopAll();
    audio.play();
    button.innerText = "⏸ Pause";
    typeText(textBox, text);
  } else {
    audio.pause();
    button.innerText = "▶ Play";
  }
}
</script>

</body>
</html>
