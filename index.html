<!DOCTYPE html>
<html>
<head>
  <title>Teacher Audio App</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #e3f2fd, #f4f7fb);
      margin: 0;
      padding: 0;
      text-align: center;
    }

    /* HEADER */
    .header {
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      padding: 30px 15px;
      border-bottom-left-radius: 25px;
      border-bottom-right-radius: 25px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.25);
    }

    .school-name {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 1.5px;
      color: #ffe082;
      text-shadow: 0 2px 6px rgba(0,0,0,0.4);
    }

    .location {
      font-size: 14px;
      opacity: 0.9;
      margin-top: 5px;
    }

    .sslc {
      font-size: 15px;
      margin-top: 5px;
    }

    .warriors {
      font-size: 18px;
      font-weight: bold;
      color: #ffeb3b;
      margin-top: 8px;
    }

    .best {
      font-size: 16px;
      margin-top: 8px;
      font-style: italic;
      color: #ffffff;
      letter-spacing: 1px;
    }

    /* CARD */
    .teacher {
      background: white;
      margin: 25px auto;
      padding: 20px;
      width: 90%;
      max-width: 350px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    button {
      padding: 10px 20px;
      border: none;
      background: #4CAF50;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
    }

    .text {
      margin-top: 12px;
      font-size: 15px;
      color: #444;
      min-height: 40px;
      border-top: 1px solid #eee;
      padding-top: 10px;
    }

  </style>
</head>

<body>

<!-- 🔥 PREMIUM HEADER -->
<div class="header">
  <div class="school-name">🏫 SAE SCHOOL</div>
  <div class="location">Karehalli, Bhadravthi</div>
  <div class="sslc">SSLC 2025-26</div>
  <div class="warriors">✨ Study Warriors ✨</div>
  <div class="best">💐 Best Wishes 💐</div>
</div>

<!-- Teacher Card -->
<div class="teacher">
  <h3>Anjali Ma'am</h3>

  <button onclick="playTeacher('audio1','text1', 'ಬಣ್ಣ ಬಣ್ಣದ ಪುಟಾಣಿಗಳ ಲೋಕ, ವರ್ಣರಂಜಿತ ನರ್ಸರಿ ಕೊಠಡಿಗಳು... ಇಲ್ಲಿ ಪ್ರತಿ ಗೋಡೆಯು')">
    ▶ Play
  </button>

  <audio id="audio1">
    <source src="https://pedduhudga.github.io/Saes/anjali.mp3" type="audio/mpeg">
  </audio>

  <div id="text1" class="text"></div>
</div>

<script>
function stopAll() {
  document.querySelectorAll("audio").forEach(a => {
    a.pause();
    a.currentTime = 0;
  });
}

function typeText(element, text) {
  element.innerHTML = "";
  let i = 0;

  function typing() {
    if (i < text.length) {
      element.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, 30);
    }
  }

  typing();
}

function playTeacher(audioId, textId, text) {
  stopAll();
  let audio = document.getElementById(audioId);
  let textBox = document.getElementById(textId);
  audio.play();
  typeText(textBox, text);
}
</script>

</body>
</html>
