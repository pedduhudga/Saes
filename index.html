<!DOCTYPE html>
<html>
<head>
  <title>Teacher Audio Library</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f4f7fb;
      margin: 0;
      padding: 20px;
    }

    h1 {
      color: #2c3e50;
      margin-bottom: 30px;
    }

    .teacher {
      background: white;
      margin: 20px auto;
      padding: 20px;
      width: 320px;
      border-radius: 12px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .teacher:hover {
      transform: scale(1.02);
    }

    audio {
      width: 100%;
      margin-top: 10px;
    }

    .transcript {
      margin-top: 12px;
      font-size: 14px;
      color: #555;
      line-height: 1.5;
    }
  </style>

</head>

<body>

<h1>🎧 Teacher Audio List</h1>

<!-- Teacher 1 -->
<div class="teacher">
  <h3>Anjali Ma'am</h3>

  <audio controls preload="auto">
    <source src="https://pedduhudga.github.io/Saes/anjali.mp3" type="audio/mpeg">
    Your browser does not support audio.
  </audio>

  <div class="transcript">
    ಬಣ್ಣ ಬಣ್ಣದ ಪುಟಾಣಿಗಳ ಲೋಕ, ವರ್ಣರಂಜಿತ ನರ್ಸರಿ ಕೊಠಡಿಗಳು...
  </div>
</div>

</body>
</html>
